name: Prod CD Pipeline (Backend)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image tag from merged PR
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('image_tag', '${{ github.event.inputs.image_tag }}');
              return;
            }

            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha
            });

            if (!prs.data || prs.data.length === 0) {
              core.setFailed(`No pull request associated with commit ${commitSha}`);
              return;
            }

            const mergedPr = prs.data.find(pr => pr.merged_at && pr.base.ref === 'main');

            if (!mergedPr) {
              core.setFailed(`No merged PR to main associated with commit ${commitSha}`);
              return;
            }

            core.setOutput('image_tag', mergedPr.head.sha);

      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: "TEAM-SEED-PLUS/SEED-PLUS-INFRA"
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: "infra-repo"

      - name: Install Ansible
        run: pip install ansible

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Install Session Manager Plugin
        run: |
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Set up SSH Key and Config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host i-*
              ProxyCommand sh -c "aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters 'portNumber=%p'"
              StrictHostKeyChecking no
              IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Run Ansible Playbook
        run: |
          cd infra-repo/aws-cd
          ansible-playbook \
            -i "${{ secrets.APP_INSTANCE_ID }}," \
            -u ubuntu \
            -e "target_app=backend \
                ecr_registry=${{ secrets.ECR_REGISTRY }} \
                ecr_repository=${{ secrets.ECR_REPOSITORY }} \
                image_tag=${{ steps.pr.outputs.image_tag }} \
                aws_region=ap-northeast-2 \
                app_env_content='${{ secrets.ENV_FILE_PROD }}'" \
            playbooks/aws_be_deploy.yml
