name: Prod CD Pipeline (Backend)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: "TEAM-SEED-PLUS/SEED-PLUS-INFRA"
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: "infra-repo"

      - name: Install Ansible
        run: pip install ansible

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Install Session Manager Plugin
        run: |
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Set up SSH Key and Config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host i-*
              ProxyCommand sh -c "aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters 'portNumber=%p'"
              StrictHostKeyChecking no
              IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Run Ansible Playbook
        run: |
          cd infra-repo/aws-cd
          ansible-playbook \
            -i "${{ secrets.APP_INSTANCE_ID }}," \
            -u ubuntu \
            -e "target_app=backend \
                ecr_registry=${{ secrets.ECR_REGISTRY }} \
                ecr_repository=${{ secrets.ECR_REPOSITORY }} \
                image_tag=${{ github.sha }} \
                aws_region=ap-northeast-2 \
                app_env_content='${{ secrets.ENV_FILE }}'" \
            playbooks/aws_be_deploy.yml