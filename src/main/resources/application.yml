server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    # 운영 환경에서 clean 허용은 위험하므로 테스트에서만 FLYWAY_CLEAN_DISABLED=false
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}

app:
  base-url: ${SERVER_BASE_URL}

external:
  rest-client:
    connect-timeout-millis: ${EXTERNAL_REST_CLIENT_CONNECT_TIMEOUT_MS:3000}
    read-timeout-millis: ${EXTERNAL_REST_CLIENT_READ_TIMEOUT_MS:5000}

analysis:
  lambda:
    profit:
      endpoint: ${PROFIT_FUNCTION_ENDPOINT}
      api-key: ${PROFIT_FUNCTION_API_KEY}
    survival:
      endpoint: ${SURVIVAL_FUNCTION_ENDPOINT}
      api-key: ${SURVIVAL_FUNCTION_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expire-time: ${JWT_ACCESS_EXPIRE_MS:86400000}
  refresh-token:
    expire-time: ${JWT_REFRESH_EXPIRE_MS:259200000}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: ${CORS_ALLOWED_METHODS}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    seed.seedplusbackend: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"
